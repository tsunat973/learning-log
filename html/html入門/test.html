<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競歩大会</title>
</head>

<body>
    <h1>競歩大会申し込みフォーム</h1>
    <form>
        <div>
            <label for="sei">姓</label>
            <input type="text" id="sei" name="sei" required>
            <label for="mei">名</label>
            <input type="text" id="mei" name="mei" required>
        </div>
        <p>参加する競歩大会を選択:</p>
        <div>
            <p>
                <input type="radio" id="5" value="5" name="distance">
                <label for="5">楽しく歩こう五キロ</label>

            </p>
            <p>
                <input type="radio" id="10" value="10" name="distance">
                <label for="10">無難な10キロ</label>

            </p>
            <p>
                <input type="radio" id="15" value="15" name="distance">
                <label for="15">チャレンジ15キロ</label>

            </p>

        </div>
        <div>
            <label for="user_email">メールアドレス</label>
            <input type="email" id="user_email" name="user_email">
            <label for="user_password">パスワード</label>
            <input type="password" id="user_password" name="user_password">
        </div>

        <div>
            <label for="age_group">参加する年代</label>
            <select name="age_group" id="age_group">
                <option value="" disabled selected>年代を選択してください</option>
                <option value="10s">10代</option>
                <option value="20s">20代</option>
                <option value="30s">30代</option>
                <option value="40s">40代</option>
                <option value="50s">50代</option>
                <option value="60s">60代以上</option>
            </select>

        </div>
        <button type="submit">登録</button>

    </form>


</body>

</html>
