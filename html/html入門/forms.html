<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Demo</title>
</head>

<body>
    <h1>Form Demo</h1>
    <!-- actionはどこに保存するか -->
    <form action="/tacos">
        <!--placeholder 何もないときに表示されるもの-->
        <p>
            <label for="username">ユーザー名: </label>
            <input id="username" type="text" placeholder="ユーザー名" name="username">
        </p>

        <p>
            <label for="password">パスワード:</label>
            <input id="password" type="password" placeholder="パスワード">
        </p>

        <p>
            <label for="color">好きな色:</label>
            <input id="color" type="color">
        </p>

        <p>
            <label for="number">好きな数字:
                <input id="number" type="number" placeholder="数字を入力" min="1" max="1000" step="10">
            </label>

        </p>

        <button>送信</button>

    </form>

    <hr>
    <h2>ハイジャック検索</h2>
    <h3>Reddit検索</h3>
    <form action="https://www.reddit.com/r/ja/search">
        <input type="text" name="q">
        <button>Reddit検索</button>
    </form>
    <h3>Google検索</h3>
    <form action="https://www.bing.com/search">
        <input type="text" name="q">
        <button>Google検索</button>
    </form>
    <h3>Youtube検索</h3>
    <form action="https://www.youtube.com/results">
        <input type="text" name="search_query">
        <button>Youtube検索 </button>
    </form>
    <h2>続・Input</h2>
    <form action="/birds">
        <p>
            <input type="checkbox" name="argee_tos" id="agree">
            <label for="agree">利用規約に同意します</label>
        </p>
        <p>
            <label for="xs">XS</label>
            <input type="radio" name="size" id="xs" value="xs">
            <label for="s">S</label>
            <input type="radio" name="size" id="s" vlaue="s">
            <label for="m">M</label>
            <input type="radio" name="size" id="m" value="m">
        </p>
        <p>
            <label for="meal">食事を選択してください</label>
            <select name="meal" id="meal">
                <option value="fish">焼き魚</option>
                <option value="salad">サラダ</option>
                <option value="steak" selected>ステーキ</option>
            </select>
        </p>
        <p>
            <label for="cheese">チーズの量:</label>
            <input type="range" id="cheese" min="1" max="10" name="cheese_level" step="7" valu="75">
        </p>
        <p>
            <label for="comments">その他コメント：</label>
            <br>
            <textarea id="comments" rows="10" cols="40" placeholder="コメントを入力してください"></textarea>
        </p>
        <button>送信</button>

    </form>

    <h2>バリエーション Demo</h2>
    <form action="/dummy">
        <label for="first">名前:</label>
        <input type="text" id="first" name="first" required>
        <p>
            <label for="username">ユーザー名:</label>
            <input type="text" id="username" name="username" minlength="5" maxlength="20" required>
        </p>
        <p>
            <input type="email">
        </p>
        <button>送信</button>
    </form>

</body>

</html>
